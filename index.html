<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Vocacional-Aptitudinal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-scrollbar { display: none; }
        .holland-table th, .holland-table td { border: 1px solid #e2e8f0; padding: 0.5rem; text-align: center; }
        .holland-table th { background-color: #f8fafc; font-weight: 600; color: #475569; font-size: 0.875rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Encabezado Institucional -->
    <header class="bg-[#0b1b33] text-white p-8 text-center shadow-md">
        <h2 class="text-amber-400 font-bold uppercase tracking-widest text-sm mb-2">Ministerio de Educación, Ciencia y Tecnología</h2>
        <p class="text-slate-400 text-xs uppercase tracking-widest mb-4">MINEDUCYT · GERENCIA DE ESTADÍSTICAS</p>
        <h1 class="text-4xl font-bold mb-2">Portal de Tableros Estadísticos</h1>
        <p class="text-slate-300">Acceso centralizado a la información educativa del país. Seleccione el reporte de interés.</p>
    </header>

    <div class="max-w-7xl mx-auto my-8 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
        <!-- Navegación de Pestañas -->
        <div class="flex border-b border-slate-200 bg-slate-50">
            <button id="btn-tab-vocacional" class="flex-1 py-4 px-6 text-sm font-bold text-blue-600 border-b-2 border-blue-600 bg-white" onclick="switchTab('vocacional')">Vocacional (9° Grado)</button>
            <button id="btn-tab-aptitudinal" class="flex-1 py-4 px-6 text-sm font-semibold text-slate-500 hover:text-slate-700 hover:bg-slate-100" onclick="switchTab('aptitudinal')">Aptitudinal (6° Grado)</button>
        </div>

        <!-- Pestaña Vocacional -->
        <div id="tab-vocacional" class="p-8 block fade-in">
            <div id="upload-vocacional" class="border-2 border-dashed border-blue-200 p-12 text-center rounded-xl bg-blue-50/30">
                <input type="file" id="file-vocacional" accept=".csv" class="hidden" onchange="handleFile(event, 'vocacional')">
                <button onclick="document.getElementById('file-vocacional').click()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">Cargar CSV Vocacional 9°</button>
            </div>
            <div id="dash-vocacional" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="flex flex-col items-center">
                        <h3 class="text-lg font-bold mb-4">Hexágono de Holland</h3>
                        <canvas id="hexChart" width="300" height="300"></canvas>
                    </div>
                    <div class="flex flex-col items-center">
                        <h3 class="text-lg font-bold mb-4">Tabla de Intereses</h3>
                        <div id="table-container-voc"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pestaña Aptitudinal -->
        <div id="tab-aptitudinal" class="p-8 hidden fade-in">
             <div id="upload-aptitudinal" class="border-2 border-dashed border-emerald-200 p-12 text-center rounded-xl bg-emerald-50/30">
                <input type="file" id="file-aptitudinal" accept=".csv" class="hidden" onchange="handleFile(event, 'aptitudinal')">
                <button onclick="document.getElementById('file-aptitudinal').click()" class="bg-emerald-600 text-white px-6 py-3 rounded-lg font-bold">Cargar CSV Aptitudinal 6°</button>
            </div>
            <div id="dash-aptitudinal" class="hidden">
                <div class="flex justify-center">
                     <canvas id="polyChart" width="400" height="400"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tipo) {
            document.getElementById('tab-vocacional').className = tipo === 'vocacional' ? 'p-8 block fade-in' : 'p-8 hidden';
            document.getElementById('tab-aptitudinal').className = tipo === 'aptitudinal' ? 'p-8 block fade-in' : 'p-8 hidden';
        }

        function handleFile(e, tipo) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const rows = text.split('\n').map(l => l.split(','));
                const headers = rows[0];
                const data = rows.slice(1);
                
                document.getElementById('upload-' + tipo).classList.add('hidden');
                document.getElementById('dash-' + tipo).classList.remove('hidden');
                
                if(tipo === 'vocacional') renderVocacional(headers, data);
                else renderAptitudinal(headers, data);
            };
            reader.readAsText(file);
        }

        function renderVocacional(headers, data) {
            // Ejemplo de promedios para el Hexágono (Usando escala max 25)
            const ctx = document.getElementById('hexChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Realista', 'Científico', 'Artístico', 'Social', 'Emprendedor', 'Oficina'],
                    datasets: [{
                        label: 'Puntaje',
                        data: [15, 22, 18, 20, 14, 12],
                        backgroundColor: 'rgba(59, 130, 246, 0.5)',
                        borderColor: 'blue'
                    }]
                },
                options: { scales: { r: { beginAtZero: true, max: 25 } } }
            });
        }

        function renderAptitudinal(headers, data) {
            const ctx = document.getElementById('polyChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Matemáticas', 'Arte', 'Ciencia', 'Humanidades', 'Tecnología'],
                    datasets: [{
                        label: 'Nivel',
                        data: [12, 10, 14, 11, 13],
                        backgroundColor: 'rgba(16, 185, 129, 0.5)',
                        borderColor: 'green'
                    }]
                },
                options: { scales: { r: { beginAtZero: true, max: 15 } } }
            });
        }
    </script>
</body>
</html>
