<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Vocacional-Aptitudinal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <!-- Encabezado Institucional -->
    <header class="bg-[#0b1b33] text-white p-8 text-center shadow-md">
        <h2 class="text-amber-400 font-bold uppercase tracking-widest text-sm mb-2">Ministerio de Educación, Ciencia y Tecnología</h2>
        <p class="text-slate-400 text-xs uppercase tracking-widest mb-4">MINEDUCYT · GERENCIA DE ESTADÍSTICAS</p>
        <h1 class="text-4xl font-bold mb-2">Tablero Vocacional-Aptitudinal</h1>
    </header>

    <div class="max-w-7xl mx-auto my-8 bg-white rounded-xl shadow-lg border border-slate-200 p-8">
        <!-- Filtros -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <select id="filtro-depto" class="border p-2 rounded"><option>Departamento</option></select>
            <select id="filtro-distrito" class="border p-2 rounded"><option>Distrito</option></select>
            <select id="filtro-centro" class="border p-2 rounded"><option>Centro Escolar</option></select>
            <select id="filtro-grado" class="border p-2 rounded"><option>Sección/Grado</option></select>
            <button onclick="aplicarFiltros()" class="bg-blue-600 text-white font-bold rounded">Filtrar</button>
        </div>

        <!-- Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-4 border rounded-xl shadow-sm">
                <h3 class="text-center font-bold mb-4">Competencias Clave (Holland)</h3>
                <canvas id="hexChart"></canvas>
            </div>
            <div class="bg-white p-4 border rounded-xl shadow-sm">
                <h3 class="text-center font-bold mb-4">Perfil Aptitudinal</h3>
                <canvas id="polyChart"></canvas>
            </div>
        </div>
    </div>

<script>
    // Inicialización de Gráficas
    function crearGraficas() {
        const ctxHex = document.getElementById('hexChart').getContext('2d');
        new Chart(ctxHex, {
            type: 'radar',
            data: {
                labels: ['Liderazgo', 'Creatividad', 'Análisis', 'Comunicación', 'Técnica', 'Social'],
                datasets: [{ label: 'Promedio', data: [25, 20, 22, 18, 25, 21], backgroundColor: 'rgba(59, 130, 246, 0.5)' }]
            },
            options: { scales: { r: { max: 25, beginAtZero: true } } }
        });

        const ctxPoly = document.getElementById('polyChart').getContext('2d');
        new Chart(ctxPoly, {
            type: 'radar',
            data: {
                labels: ['Matemáticas', 'Arte', 'Ciencia', 'Humanidades', 'Tecnología'],
                datasets: [{ label: 'Nivel', data: [15, 12, 14, 10, 13], backgroundColor: 'rgba(16, 185, 129, 0.5)' }]
            },
            options: { scales: { r: { max: 15, beginAtZero: true } } }
        });
    }

    // Carga de Datos
    async function cargarDatos() {
        try {
            const urlVoc = "https://raw.githubusercontent.com/MikelMINED/Dashboard-Educativo-Jerarquico/main/BD_Reporte_Vocacional_9_Ligero.csv";
            const resp = await fetch(urlVoc);
            if(!resp.ok) throw new Error("No se pudo conectar con GitHub.");
            console.log("Datos cargados correctamente");
            crearGraficas();
        } catch (e) {
            console.error(e);
            document.body.innerHTML += `<div class="fixed bottom-4 right-4 bg-red-600 text-white p-4 rounded">Error: ${e.message}</div>`;
        }
    }

    cargarDatos();
</script>
</body>
</html>
